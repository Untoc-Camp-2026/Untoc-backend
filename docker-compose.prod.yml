# docker-compose.prod.yml
services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1520
      MYSQL_DATABASE: untoc
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p1520"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    build: 
      context: ./app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SQLALCHEMY_DATABASE_URL: mysql+aiomysql://root:1520@db:3306/untoc
    ports:
      - "8080:8000"
    volumes:
      - uploads_data:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      - internal

  front:
    build:
      context: ./front
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=http://161.33.19.121:8080
    restart: always
    ports:
      - "8000:3000"
    depends_on:
      - api
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mysql_data:
  uploads_data: