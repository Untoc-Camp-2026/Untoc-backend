services:

  db:
    image: mysql:8.0
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: untoc
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      ports:
       - "3307:3306"
    networks:
      - internal_net


  api:
    build:
      context: ./app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - internal_net

  frontend:
    build:
      context: ./front 
    restart: always
    ports:
      - "80:3000" 
    depends_on:
      - api
    networks:
      - internal_net

networks:
  internal_net:
    driver: bridge

volumes:
  mysql_data:
  uploads_data: